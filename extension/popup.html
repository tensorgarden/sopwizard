<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --ink: #17202e;
        --muted: #626c7a;
        --line: #e5e2d9;
        --accent: #2b59c3;
        --red: #b3362f;
      }
      body {
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        width: 280px;
        margin: 0;
        padding: 16px;
        background: #fbfaf7;
      }
      .brand { display: flex; align-items: center; gap: 8px; font-weight: 650; font-size: 13px; margin-bottom: 14px; }
      .brand .dot { width: 18px; height: 18px; border-radius: 6px; background: var(--accent); position: relative; }
      .brand .dot::after { content: ''; position: absolute; inset: 5px 5px 7px 5px; border-radius: 2px; border: 2px solid #fff; border-bottom: 0; }
      label { display: block; margin: 0 0 4px; color: var(--muted); font-weight: 500; }
      input, textarea {
        width: 100%; padding: 7px 9px; margin-bottom: 12px;
        border: 1px solid var(--line); border-radius: 8px;
        font: inherit; color: var(--ink); background: #fff; box-sizing: border-box;
      }
      input:focus, textarea:focus { outline: 2px solid #eaf0fc; border-color: var(--accent); }
      textarea { min-height: 54px; resize: vertical; }
      button {
        width: 100%; padding: 10px; border: 0; border-radius: 8px;
        font: 600 13.5px inherit; letter-spacing: .01em; cursor: pointer; color: #fff;
      }
      .start { background: var(--accent); }
      .stop { background: var(--red); }
      .status { display: flex; align-items: flex-start; gap: 7px; margin-top: 11px; color: var(--muted); }
      .status .led { width: 7px; height: 7px; border-radius: 50%; background: #c6cbd2; flex: none; margin-top: 5px; }
      .status.live .led { background: var(--red); animation: pulse 1.2s infinite; }
      .status.live { color: var(--red); font-weight: 600; }
      .status.ok .led { background: #11734f; }
      .status.ok { color: #11734f; font-weight: 600; }
      .status.warn .led { background: #9a6b1f; }
      .status.warn { color: #9a6b1f; }
      @keyframes pulse { 50% { opacity: .35; } }
      #retry { margin-top: 10px; background: #11734f; }
      button:disabled { opacity: .55; cursor: default; }
      [hidden] { display: none !important; }
      .server {
        display: flex; gap: 7px; align-items: flex-start;
        font-size: 12px; line-height: 1.4; padding: 8px 10px;
        border-radius: 8px; margin-bottom: 12px;
      }
      .server::before { content: ''; width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex: none; }
      .server.down { background: #fdf3e0; color: #7a5a1a; border: 1px solid #eaddbf; }
      .server.down::before { background: #9a6b1f; }
      .server.up { background: #e7f4ee; color: #11734f; border: 1px solid #cfe8dc; }
      .server.up::before { background: #11734f; }
    </style>
  </head>
  <body>
    <div class="brand"><span class="dot"></span>SOPWizard</div>

    <label for="task">What are you about to do?</label>
    <input id="task" placeholder="e.g. Create a new client record" />

    <label for="notes">Anything worth knowing? (optional)</label>
    <textarea id="notes" placeholder="Systems, rules, common exceptions…"></textarea>

    <div id="server" class="server" role="status" aria-live="polite" hidden></div>
    <button id="toggle" class="start">Start recording</button>
    <button id="retry" hidden>Send last recording</button>
    <div class="status" id="status" role="status" aria-live="polite"><span class="led"></span><span id="statusText">Idle</span></div>

    <script src="popup.js"></script>
  </body>
</html>
